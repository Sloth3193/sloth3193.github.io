<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Parts List Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>PC Parts List Generator</h1>
        <form id="partsForm">
            <label for="budget">What's your budget?</label>
            <input type="number" id="budget" name="budget" required>

            <label for="usage">Primary usage of the PC?</label>
            <select id="usage" name="usage" required>
                <option value="gaming">Gaming</option>
                <option value="videoEditing">Video Editing</option>
                <option value="programming">Programming</option>
                <option value="generalUse">General Use</option>
            </select>

            <label for="preference">Do you prefer AMD or Intel?</label>
            <select id="preference" name="preference" required>
                <option value="amd">AMD</option>
                <option value="intel">Intel</option>
                <option value="noPreference">No Preference</option>
            </select>

            <button type="button" id="generateParts">Generate Parts List</button>
            <button type="button" id="sendEmail">Send Email</button>
        </form>
        <div id="results"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
