<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PC Build Finder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Find Your PC Build</h1>
    <p>Enter your budget and get custom PC build suggestions.</p>

    <div class="search-bar">
      <input type="number" id="budgetInput" placeholder="Enter your budget ($)" />
      <button onclick="getBuilds()">Search</button>
    </div>

    <div id="buildsContainer" class="builds-container"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
